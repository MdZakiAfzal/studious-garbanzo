version: '3.8'

services:
  api:
    build: .
    container_name: node_api
    restart: always
    ports:
      - "3000:3000"
    # 👇 THIS IS THE MAGIC FIX 👇
    env_file:
      - .env
    environment:
      - PORT=3000
      - REDIS_URL=redis://redis:6379
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      - redis

  redis:
    image: redis:7.0-alpine
    container_name: redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  redis_data: